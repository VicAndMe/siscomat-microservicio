version: '3.8'

services:
  microservicio-pdf:
    build: .
    container_name: siscomat-pdf
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    
    networks: 
      - siscomat_network


networks:
  siscomat_network:
    external: true